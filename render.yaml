# Render blueprint. Push this repo to GitHub, then in Render:
#   New +  →  Blueprint  →  pick this repo  →  Apply.
# After deploy, set ANTHROPIC_API_KEY and ALLOWED_ORIGINS in the dashboard.
services:
  - type: web
    name: bike-bot-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false           # set in dashboard, never commit
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5
      - key: ALLOWED_ORIGINS
        sync: false           # set to your Vercel URL
      - key: MAX_UPLOAD_BYTES
        value: "26214400"
